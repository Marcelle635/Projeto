<script>
  // 🔠 Aumentar e diminuir fonte (todo o site)
    document.addEventListener("DOMContentLoaded", function() {
      let tamanhoFonte = localStorage.getItem("tamanhoFonte")
        ? parseInt(localStorage.getItem("tamanhoFonte"))
        : 70;
  
      const html = document.documentElement;
      html.style.fontSize = tamanhoFonte + "%";
  
      document.getElementById("aumentar-fonte").addEventListener("click", function() {
        if (tamanhoFonte < 70) {
          tamanhoFonte += 10;
          html.style.fontSize = tamanhoFonte + "%";
          localStorage.setItem("tamanhoFonte", tamanhoFonte);
        }
      });
  
      document.getElementById("diminuir-fonte").addEventListener("click", function() {
        if (tamanhoFonte > 40) {
          tamanhoFonte -= 10;
          html.style.fontSize = tamanhoFonte + "%";
          localStorage.setItem("tamanhoFonte", tamanhoFonte);
        }
      });
    });
</script>

<script>

 const form = document.getElementById('form');
 const campos = document.querySelectorAll('.required');
 const spans = document.querySelectorAll('.span-required');
 const emailRegex  = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  
  function setError(index){
   campo[index].style.border = '2px solid #e63636';
   spans[index].style.display ='block';
 }

  function removeError(index){
   campo[index].style.border = '';
   spans[index].style.display ='none';

  }

  function nomeValidate() {
   if (campos[0].value.length < 15 || campos[0].value.length > 80)
    {   
      setError(0)
    }
   else                                             
    {
      removeError(0)
    }
  }  

  function emailValidate() {
  if(!emailRegex.test(campos[5],value))

  {
    setError(5)
  }

  else                                             
  {
    removeError(5)
  }
 }

function buscarCEP() {
    const cepInput = document.getElementById('cep');
    // 1. Limpa o CEP para ter apenas 8 dígitos
    const cep = cepInput.value.replace(/\D/g, ''); 

    // Validação básica do CEP
    if (cep.length !== 8) {
        alert("CEP deve ter 8 dígitos.");
        return;
    }
    
    // URL da API da ViaCEP
    const url = `https://viacep.com.br/ws/${cep}/json/`;

    // Faz a requisição (fetch)
      fetch(url)
        .then(response => response.json())
        .then(dados => {
            if (dados.erro) {
                alert("CEP não encontrado. Preencha manualmente.");
                return;
            }

            // 4. Preenchimento dos campos do formulário
            document.getElementById('logradouro').value = dados.logradouro;
            document.getElementById('bairro').value = dados.bairro;
            document.getElementById('cidade').value = dados.localidade;
            document.getElementById('uf').value = dados.uf;
        })
        .catch(error => {
            console.error('Erro de conexão:', error);
            alert("Erro na conexão na API. Preencha manualmente.");
        });
}

</script>
