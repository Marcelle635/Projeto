
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízes do café</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!--Menu com funcionalidades-->
    <header class="header">
  <section>
    <!-- Lado esquerdo: Logo + Navegação -->
    <div class="left-side">
      <a href="#" class="logo">
        <img src="img/logo.png" alt="logo">
      </a>

      <nav class="navbar">
        <a href="comum.html">Home</a>
        <a href="menucomum.html">Menu</a>
      </nav>
    </div>
 
    <!-- Lado direito: Botões e links -->
    <div class="areas">
      <a href="#">Login</a> |
      <button id="aumentar-fonte">A+</button>
      <button id="diminuir-fonte">A-</button> 
    </div>
  </section>
 </header>

 <script>
  // 🔠 Aumentar e diminuir fonte (todo o site)
    document.addEventListener("DOMContentLoaded", function() {
      let tamanhoFonte = localStorage.getItem("tamanhoFonte")
        ? parseInt(localStorage.getItem("tamanhoFonte"))
        : 100;
  
      const html = document.documentElement;
      html.style.fontSize = tamanhoFonte + "%";
  
      document.getElementById("aumentar-fonte").addEventListener("click", function() {
        if (tamanhoFonte < 150) {
          tamanhoFonte += 10;
          html.style.fontSize = tamanhoFonte + "%";
          localStorage.setItem("tamanhoFonte", tamanhoFonte);
        }
      });
  
      document.getElementById("diminuir-fonte").addEventListener("click", function() {
        if (tamanhoFonte > 70) {
          tamanhoFonte -= 10;
          html.style.fontSize = tamanhoFonte + "%";
          localStorage.setItem("tamanhoFonte", tamanhoFonte);
        }
      });
    });
</script>

  <main>
  <div>
    <br>
    <h1>LOGIN</h1>  
  </div>
   <section>
    <form>
      <div>
       <label for="login"></label>
       <input type="text" id="login" name="login" placeholder="LOGIN:" required>
      </div>
      <br>

      <div>
       <label for="senha"></label>
       <input type="password" id="senha" name="senha" placeholder="SENHA:" required>
      </div>
      <br>
    </form>
   </section> 

    <div class="botao">
      <button type="submit">ENVIAR</button>
      <button type="reset">LIMPAR TELA</button>
    </div>
    <br>
    <h2><a href="cadastro.html" class="link-cadastre-se">CADASTRE-SE</a></h2>
    <br>
  </main>
</body>
